<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: transparent;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
      width: 360px;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .logo span {
      color: white;
      font-size: 28px;
      font-weight: 700;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 13px;
      color: #9ca3af;
    }
    .copyright {
      font-size: 10px;
      color: #d1d5db;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>SK</span></div>
    <h1>SupportDesk</h1>
    <p class="tagline">Customer Support Platform</p>
    <div class="loader">
      <div class="spinner"></div>
      <span class="status">Starting services...</span>
    </div>
    <p class="copyright">&copy; 2026 Sujit Kumar Thakur</p>
  </div>
</body>
</html>
